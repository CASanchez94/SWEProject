{% load crispy_forms_tags %}
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="register-page">
    <div class="container mt-5">
        <div class="card p-4 shadow">
            <h2>Register</h2>

            <form method="post" id="regForm" data-majors-url="{% url 'ajax_load_majors' %}">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 mt-3">Create Account</button>
            </form>
        </div>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>

<script>
$(document).ready(function() {
    const $major = $("#id_major");

    $major.prop("disabled", true);

    $("#id_college").on("change", function () {
        const collegeId = $(this).val();
        const url = $("#regForm").data("majors-url");

        if (!collegeId) {
            $major.html('<option value="">---------</option>');
            $major.prop("disabled", true);
            return;
        }

        $.ajax({
            url: url,
            data: { 'college_id': collegeId },
            success: function (data) {
                $major.html(data);
                $major.prop("disabled", false);
            },
            error: function(xhr) {
                console.error("AJAX Error: ", xhr.statusText);
                $major.prop("disabled", true);
            }
        });
    });
});
</script>

</body>
</html>
