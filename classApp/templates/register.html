{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2>Register</h2>
        <form method="post" id="regForm" data-majors-url="{% url 'ajax_load_majors' %}">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100 mt-3">Create Account</button>
        </form>
    </div>
</div>

<script src="https://code.jquery.com"></script>
<script>
    $("#id_college").change(function () {
        const url = $("#regForm").attr("data-majors-url");
        const collegeId = $(this).val();

        $.ajax({
            url: url,
            data: { 'college_id': collegeId },
            success: function (data) {
                $("#id_major").html(data);
            }
        });
    });
</script>
{% endblock %}
