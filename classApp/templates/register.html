{% load crispy_forms_tags %}
{% load static %}


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registeration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
</head>
<body>
   
    <div class="container mt-5">
        <div class="card p-4 shadow">
            

            <form method="post" id="regForm" data-majors-url="{% url 'ajax_load_majors' %}">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 mt-3">Create Account</button>
            </form>
        </div>
    </div>
    
<script>
$(document).ready(function() {
    const $major = $("#id_major");

    // Initially disable the Major dropdown
    $major.prop("disabled", true);

    $("#id_college").on("change", function () {
        const collegeId = $(this).val();
        const url = $("#regForm").data("majors-url");

        if (!collegeId) {
            // No college selected → reset and disable Major
            $major.html('<option value="">---------</option>');
            $major.prop("disabled", true);
            return;
        }

        // AJAX request to load majors
        $.ajax({
            url: url,
            data: { 'college_id': collegeId },
            success: function (data) {
                $major.html(data);        // Replace options
                $major.prop("disabled", false);  // Enable Major
            },
            error: function(xhr) {
                console.error("AJAX Error: ", xhr.statusText);
                $major.prop("disabled", true);  // Keep disabled on error
            }
        });
    });
});
</script> 
</body>
</html>
