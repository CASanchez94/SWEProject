{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">

  <title>Homepage</title>
</head>
<body>
  

<div class="login-page d-flex justify-content-center align-items-center vh-100">

<div class="login-container p-4 bg-white rounded shadow text-center">

<h1 class="fw-bold mb-4">Login</h1>

<form method="post">
  {% csrf_token %}

  <div class="mb-3 text-start">
    <label for="id_username" class="form-label">Username</label>
    {{ form.username }}
  </div>

  <div class="mb-3 text-start">
    <label for="id_password" class="form-label">Password</label>
    {{ form.password }}
     <div class="form-text">UTRGV will never ask for your password.</div>
  </div>

  <button class="btn btn-primary w-100 mt-2" type="submit">Login</button>

</form>

<a href="{% url 'register' %}" class="btn btn-outline-primary w-100 mt-2">Register</a>
</div>


</div>
</body>
</html>
